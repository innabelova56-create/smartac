# ┌───────────────────────────────────────────────────────────────────────────────┐
# │                              NOTES                                            │
# └───────────────────────────────────────────────────────────────────────────────┘

# Как работает система накопления:
# 
# ДЛЯ ЧИТЕРОВ (вероятность > threshold):
#   - Каждый удар увеличивает буфер: buffer += (prob - threshold) * multiplier
#   - Буфер повышает отображаемую вероятность: display = prob + min(buffer/100, 0.3)
#   - Результат: 0.68 → через 20 ударов → 0.95+
#
# ДЛЯ ЛЕГИТНЫХ (вероятность < 0.1):
#   - Каждый удар уменьшает буфер: buffer -= decay
#   - Низкий буфер понижает вероятность: display = prob - min(buffer/200, 0.15)
#   - Результат: 0.40 → через 20 ударов → 0.15-0.20
#
# ДЛЯ СРЕДНИХ (0.1 - threshold):
#   - Буфер не меняется
#   - Вероятность остается как есть
#
# Подробнее: см. VIOLATION_SYSTEM.md

