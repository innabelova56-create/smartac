name: SmartAI
version: '1.0'
main: com.smart.smartAI.SmartAI
api-version: '1.16'
author: smart
description: AI-powered anti-cheat для Paper 1.16.5+

commands:
  smartai:
    description: Управление сбором данных для AI
    usage: /smartai <start|stop> [legit|cheat]
    permission: smartai.admin

permissions:
  smartai.admin:
    description: Доступ к командам SmartAI
    default: op
  smartai.alerts:
    description: Получение алертов о подозрительных игроках
    default: op
